name: Release WordPress plugin

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  PLUGIN_SLUG: visual-nav-builder
  PLUGIN_FILE: atx-nav-menu.php
  ZIP_NAME: visual-nav-builder.zip

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate and stamp version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3"
            exit 1
          fi

          sed -i -E "s/^ \\* Version: .*/ * Version: ${VERSION}/" "$PLUGIN_FILE"
          sed -i -E "s/const VERSION = '[^']+';/const VERSION = '${VERSION}';/" "$PLUGIN_FILE"
          sed -i -E "s/^Stable tag: .*/Stable tag: ${VERSION}/" readme.txt

      - name: Build installable ZIP
        shell: bash
        run: |
          mkdir -p "build/${PLUGIN_SLUG}"
          rsync -a ./ "build/${PLUGIN_SLUG}/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'build/' \
            --exclude '*.zip' \
            --exclude 'assets/exports/atx-nav-export-*.json'
          cd build
          zip -qr "../${ZIP_NAME}" "${PLUGIN_SLUG}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "$ZIP_NAME" --generate-notes --title "$GITHUB_REF_NAME"
