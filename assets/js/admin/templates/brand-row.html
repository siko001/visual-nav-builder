<div class="atx-nav-brand-row" style="display:flex;gap:10px;align-items:center;margin-bottom:8px;padding:10px;background:#f9f9f9;border:1px solid #eee;border-radius:4px;">
	<input type="hidden" name="atx_brands[{{itemId}}][{{index}}][logo]" value="" class="atx-brand-logo-id" />
	<div class="atx-brand-preview" style="width:50px;height:50px;border:1px solid #ddd;border-radius:4px;overflow:hidden;flex-shrink:0;background:#fff;"></div>
	<input type="text" name="atx_brands[{{itemId}}][{{index}}][name]" value="" placeholder="Brand name" style="flex:1;" class="widefat" />
	<input type="text" name="atx_brands[{{itemId}}][{{index}}][link]" value="" placeholder="Brand URL" style="flex:1;" class="widefat" />
	<button type="button" class="button button-small atx-brand-upload-btn">Logo</button>
	<button type="button" class="button-link atx-brand-remove-btn" style="color:#a00;font-size:18px;">&times;</button>
</div>
