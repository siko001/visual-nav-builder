<div class="atx-nav-slide-row" style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding:12px;background:#f9f9f9;border:1px solid #eee;border-radius:4px;">
	<div style="flex-shrink:0;">
		<input type="hidden" name="atx_slider[{{itemId}}][{{index}}][image]" value="" class="atx-slide-image-id" />
		<div class="atx-slide-preview" style="width:80px;height:80px;border:1px solid #ddd;border-radius:4px;overflow:hidden;background:#fff;"></div>
		<button type="button" class="button button-small atx-slide-upload-btn" style="margin-top:6px;width:100%;">Select Image</button>
	</div>
	<div style="flex:1;min-width:0;">
		<input type="text" name="atx_slider[{{itemId}}][{{index}}][link]" value="" placeholder="Link URL" class="widefat" style="margin-bottom:6px;" />
		<input type="text" name="atx_slider[{{itemId}}][{{index}}][badge]" value="" placeholder="Badge text (e.g. SPECIAL OFFERS)" class="widefat" style="margin-bottom:6px;" />
		<input type="text" name="atx_slider[{{itemId}}][{{index}}][title]" value="" placeholder="Title (e.g. 20% Discount)" class="widefat" style="margin-bottom:6px;" />
		<input type="text" name="atx_slider[{{itemId}}][{{index}}][description]" value="" placeholder="Description" class="widefat" style="margin-bottom:6px;" />
		<div style="display:flex;gap:6px;">
			<input type="text" name="atx_slider[{{itemId}}][{{index}}][original_price]" value="" placeholder="Was price" class="widefat" />
			<input type="text" name="atx_slider[{{itemId}}][{{index}}][sale_price]" value="" placeholder="Sale price" class="widefat" />
		</div>
	</div>
	<button type="button" class="button-link atx-slide-remove-btn" style="color:#a00;font-size:18px;flex-shrink:0;">&times;</button>
</div>
